# ############################################################################################################################
# #        ##   This plugin in order to capture XRayer quickly, might generate false positives for players who are lucky!   ##
# #  Warn  ##   Be careful not to set the VL threshold too low!                                                             ##
# #        ##   Don't detect for common ores either, you should only detect for rare ores!                                  ##
# ############################################################################################################################

# ############################################################################################################################
# #        ##   Default configuration may be slow on the first check-out.                                                   ##
# #  Info  ##   It will be more accurate afterwards,                                                                        ##
# #        ##   Therefore, it is recommended to adjust the configuration to suit your needs.                                ##
# ############################################################################################################################

xray:
  enable: true # Enable X-ray detection
  
  max-height: 128 # Only detect operations below this height
  
  # The type of ore a player has to mine before being able to be checked
  # List of allowed materials: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
  rare-ores:
  - ANCIENT_DEBRIS
  
  # Mined length record limit (Unit: block)
  max_path_length: 500
  
  # Path record is reset after the player VL is 0 {n} minutes.
  trace_remove: 15
  
  max_vein_distance: 3 # When two veins are close together, VL is not increased.
  
  # VL is increased as the player digs the number of veins
  veinCountThreshold: 3
  
  # Small vein detection size
  # If a vein contains <= this number of blocks, the plugin uses a more sensitive
  # comparison strategy (cluster overlap/min distance) to decide whether it's a new vein.
  # Default: 4
  small_vein_detection_size: 4
  
  path-detection:
    turn-count-threshold: 10 # Maximum number of turns threshold
    branch-count-threshold: 6 # Maximum number of branches
    y-change-threshold: 0 # Maximum Y-axis change threshold
    y-change-threshold-add-required: 0 # If y pos transformation exceeds this value, the threshold is increased
  
  # Natural Detection
  natural-detection:
    enable: false
