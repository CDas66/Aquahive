# ###################################################################################################
# VotingPlugin – VoteSites Configuration (VoteSites.yml)
# Author: BenCodez
#
# This file defines:
#  • Vote sites (matching the incoming ServiceSite / serviceName)
#  • Vote URLs shown by /vote
#  • Vote delays used by /vote next (and optional vote-delay enforcement)
#  • INLINE rewards per site (no reward files required)
#  • Optional “EverySiteReward” (reward on every configured site vote)
#
# ─────────────────────────────────────────────────────────────────────────────
# 📑 Quick Notes
# ─────────────────────────────────────────────────────────────────────────────
# • The VoteSites key name (example: ExampleVoteSite) is the internal identifier:
#   - Used for saving vote-site specific data
#   - Keep it short: NO spaces, NO dots
#
# • ServiceSite MUST match the incoming vote “serviceName” exactly.
#   - If votes aren’t being detected, check your console logs after voting.
#
# • Inline rewards are the normal setup for most servers:
#   - You do NOT need reward files/folders to run rewards.
#   - Reward files are optional organization only.
#   - Inline reward docs:
#       https://github.com/BenCodez/VotingPlugin/wiki/Rewards
#
# • Advanced reward systems (Top Voter, Milestones, Cumulative, AllSite, etc.)
#   are configured in specialrewards.yml (not here).
#
# ─────────────────────────────────────────────────────────────────────────────
# 🌐 Proxy / Network Setups (Velocity / Bungee / Multi-server)
# ─────────────────────────────────────────────────────────────────────────────
# • Votes are typically received at the proxy and then forwarded to backend servers.
# • Rewards are usually processed on BACKEND servers.
# • Make sure each backend has a unique ServerName in BungeeSettings.yml.
# • Keep votesites.yml consistent across all backend servers (recommended).
#
# ─────────────────────────────────────────────────────────────────────────────
# 🧠 Editing Tips
# ─────────────────────────────────────────────────────────────────────────────
# • Use Ctrl + F to search.
# • Setting a message to '' disables it (empty string).
# • Removing a config entry causes the plugin to fall back to its internal default.
#   (Only remove entries intentionally, as defaults may change between versions.)
#
# ─────────────────────────────────────────────────────────────────────────────
# 📘 Documentation
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Wiki (primary):
#   https://github.com/BenCodez/VotingPlugin/wiki
#
# Second / New Wiki (WIP):
#   https://wiki.bencodez.com/en/VotingPlugin
#
# ###################################################################################################

VoteSites:
  # Site 2 example
  Site2:
    Enabled: false
    Name: Site2
    ServiceSite: Crafty.gg
    VoteURL: link to vote URL here, used in /vote
    VoteDelay: 24h
    DisplayItem:
      Material: DIAMOND
      Amount: 1
    Rewards:
      Commands:
      - say hello
      
      # Advanced example
      # 50% chance for reward1, if reward1 not given then 20% chance to get reward2, if reward2 not given then fallback
      AdvancedPriority:
        # Similar to priority, but no need to have to use reward files
        # Add requirements under each reward
        # Will go in order from list here and try to run each of the following rewards...
        # This name can be anything, but they need to be different
        Reward1:
          Chance: 50
          # Any other requirement here
          # If any requirement fails, the next reward will be attempted
          # Use permission requirement for rank based rewards
          # RequirePermission: true
          # Permission: 'permhere'
          Messages:
            Player: You got first reward
        Reward2:
          Chance: 20
          Messages:
            Player: You got second reward
        # Fallback, 100% chance, after other rewards fail chances
        Fallback:
          Messages:
            Player: You got unlucky
      
      # Give 1 diamond regardless of above
      Items:
        item1:
          Material: DIAMOND
          Amount: 1
      
      Messages:
        Player: You voted
  MC-Server-List:
    Enabled: true
    ServiceSite: MC-Server-List
    VoteURL: '[Text="&aClick here to vote",url="https://minecraft-server-list.com/server/518871/vote/"]'
    VoteDelay: 24h
    DisplayItem:
      Material: WHITE_CONCRETE
      Amount: 1
    Rewards:
      Messages:
        Player: '&aThanks for voting on %ServiceSite%!'
  minecraft-mp:
    Enabled: true
    ServiceSite: Minecraft-mp
    VoteURL: '[Text="&aClick here to vote",url="https://minecraft-mp.com/server/356013/vote/"]'
    VoteDelay: 24h
    DisplayItem:
      Material: ORANGE_CONCRETE
      Amount: 1
    Rewards:
      Messages:
        Player: '&aThanks for voting on %ServiceSite%!'

# Reward for any site
# Similar to AnySiteReward
# This requires the site to be configured in order to get the reward.
EverySiteReward: {}
