# Aqua Hive Coin Shop
# Convert real money to in-game coins and access other shops
#=========================================================
menu_title: '&6&l✦ COIN SHOP & MAIN MENU ✦'
open_command:
  - store
  - coinshop
  - coins
  - cshop
open_commands:
  - '[sound] BLOCK_CHEST_OPEN'
size: 54

# Cool people with permission can bypass everything (optional)

items:
  # ============= COINS EXCHANGE (DIAMOND) =============
  diamond:
    material: SUNFLOWER
    slot: 11
    priority: 1
    update: true
    display_name: '&b&l⛁ COINS EXCHANGE'
    lore:
      - '&7A Unique Way To Convert Your Money To Coins'
      - '&7Earn more coins with more money'
      - ''
      - '&ePrice: &f$1,000,000 for &6⛁ 100'
      - '&eYour Balance: &f$%vault_eco_balance%'
      - ''
      - '&aLeft-click to purchase'
    
    left_click_requirement:
      requirements:
        has_enough_money:
          type: has money
          amount: 1000000
      deny_commands:
        - '[sound] ENTITY_VILLAGER_NO'
        - "[message] &8[&6&lCoinShop&8] &cYou don't have enough money! You need $1,000,000"
    
    left_click_commands:
      - '[sound] ENTITY_PLAYER_LEVELUP'
      - '[console] coins give %player_name% 100'
      - '[console] eco take %player_name% 1000000'
      - "[message] &8[&6&lCoinShop&8] &aYou purchased &b⛁ 100 &afor &f$1,000,000"
      - '[refresh]'

