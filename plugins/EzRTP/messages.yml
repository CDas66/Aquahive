# EzRTP MiniMessage templates
#
# These messages support MiniMessage formatting and placeholder tokens such as
# <world>, <x>, <z>, <position>, <server>, <cost>, <target-biome>, and <cached-locations>.
# Examples:
#   - Use hex: <#ff8800>Orange text</#ff8800>
#   - Use gradients: <gradient:#ff0000:#00ff00>Red→Green</gradient>
example-hex: "<#ff8800>Hex colored example</#ff8800>"
example-gradient: "<red>Gradient example</red>"
teleporting: "<gray>Searching for a safe location...</gray>"
teleport-success: "<green>Teleported to <white><x></white>, <white><z></white> in <white><world></white>.</green>"
teleport-failed: "<red>Unable to find a safe location. Please try again.</red>"
teleport-failed-biome: "<red>No valid biome was found. Please try again or try a different biome filter.</red>"
teleport-fallback-success: "<yellow>No locations found through search. Falling back to a cached random location: (<white><x></white>, <white><z></white>).</yellow>"
teleport-fallback-no-cache: "<red>No cached locations are available for teleportation. Please wait for locations to be pre-cached.</red>"
teleport-failed-search: "<red>Search failed: No valid locations found.</red>"
world-missing: "<red>The configured world '<white><world></white>' is not available.</red>"
join-searching: "<gray>Finding you a safe place to explore...</gray>"
insufficient-funds: "<red>You need <white><cost></white> coins to use random teleport.</red>"
queue-queued: "<gray>You joined the random teleport queue. Position: <white><position></white>.</gray>"
queue-full: "<red>The random teleport queue is currently full. Please try again soon.</red>"

# Countdown messages
countdown-start: "<yellow>Teleporting in <white><seconds></white> seconds...</yellow>"
countdown-tick: "<gray><seconds>...</gray>"

# Cooldown and usage limit messages
cooldown: "<red>You must wait <white><seconds></white> seconds before using /rtp again.</red>"
limit-daily: "<red>You have reached your daily /rtp limit for this world.</red>"
limit-weekly: "<red>You have reached your weekly /rtp limit for this world.</red>"

# GUI messages
gui-cache-filter-info: "<yellow>Only showing options with cached RTP locations available.</yellow>"
gui-no-destinations: "<red>No teleport destinations are currently available.</red>"
gui-cooldown: "<red>You cannot open the teleport GUI while on cooldown.</red>"

# Network messages
network-service-unavailable: "<red>Unable to connect to the network service right now. Please try again later.</red>"
network-server-offline: "<red>That server is currently offline.</red>"

# Command messages
command-no-permission-reload: "<red>You do not have permission to reload EzRTP.</red>"
command-reload-success: "<green>EzRTP configuration reloaded.</green>"
command-no-permission-stats: "<red>You do not have permission to view EzRTP statistics.</red>"
command-service-not-initialized: "<red>Teleport service not initialized.</red>"

# ForceRTP messages
forcertp-no-permission: "<red>You do not have permission to use forced random teleport.</red>"
forcertp-player-not-found: "<red>Player '<white><player></white>' not found or is not online.</red>"
forcertp-success: "<green>Forcing random teleport for player <white><player></white>...</green>"
forcertp-target-notify: "<yellow>You are being teleported by an administrator...</yellow>"
forcertp-invalid-usage: "<red>Usage: /rtp forcertp <player> [world]</red>"
